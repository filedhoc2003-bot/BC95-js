<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tính Tiền Cáp</title>
    <!-- link sử dụng tailwind -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <main class="max-w-[1440px] m-auto p-50">
      <section class="bg-gray-100 rounded-lg shadow-lg p-6 mt-5">
        <form id="formHoaDon" class="space-y-4">
          <!-- Mã KH -->
          <div>
            <label class="block font-medium mb-1">Mã Khách Hàng</label>
            <input
              type="number"
              id="maKH"
              class="w-full border rounded px-3 py-2"
              placeholder="Mời bạn nhập mã khách hàng"
              required
            />
            <p id="erroMaKH" class="hidden text-red-400"></p>
          </div>
          <!-- Loại khách hàng -->
          <div>
            <label class="block font-medium mb-1">Loại Khách Hàng</label>
            <select id="loaiKH" class="w-full border rounded px-3 py-2">
              <option value="">--Chọn loại khách hàng--</option>
              <option value="nhaDan">Nhà Dân</option>
              <option value="doanhNghiep">Doanh Nghiệp</option>
            </select>
            <p id="erroLoaiKH" class="hidden text-red-400"></p>
          </div>
          <!-- Số kết nối (chỉ hiện khi chọn doanh nghiệp) -->
          <div id="wrapKetNoi" class="hidden">
            <label class="block font-medium mb-1">Số Kết Nối </label>
            <input
              type="number"
              id="soKetNoi"
              min="1"
              class="w-full border rounded px-3 py-2"
              placeholder="Mời bạn nhập số kết nối"
            />
            <p id="erroSoKetNoi" class="hidden text-red-400"></p>
          </div>
          <!-- Số kênh cao cấp -->
          <div>
            <label class="block font-medium mb-1">Số Kênh Cao Cấp</label>
            <input
              type="number"
              id="soKenhCaoCap"
              class="w-full border rounded px-3 py-2"
              min="0"
              placeholder="Mời bạn nhập số kênh cao cấp"
            />
            <p id="erroSoKenhCaoCap" class="hidden text-red-400"></p>
          </div>
          <!-- Nút tính tiền hóa đơn -->
          <button
            type="submit"
            class="w-full/2 bg-blue-500 rounded-md text-white px-4 py-2 hover:bg-blue-300"
          >
            Tính tiền cáp
          </button>
        </form>
        <p id="resultHoaDon" class="hidden top-4 font-bold"></p>
      </section>
    </main>
    <!-- script -->
    <script src="../js/index.js"></script>
    <script src="../js/arrayMethod(ttbuoi12).js"></script>
  </body>
</html>
