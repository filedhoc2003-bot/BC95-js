<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bài tập if-else statement</title>
    <!-- link sử dụng tailwind -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <div class="mx-auto max-w-5xl p-6 rounded-lg shadow bg-gray-400 mt-10">
      <!-- tính diện tích -->
      <div>
        <label>Nhập chiều dài: </label>
        <input
          type="number"
          id="chieuDai"
          placeholder="Mời nhập chiều dài"
          class="w-full px-3 py-2 border-2 rounded border-black"
        />
        <label>Nhập chiều rộng: </label>
        <input
          type="number"
          id="chieuRong"
          placeholder="Mời nhập chiều rộng"
          class="w-full px-3 py-2 border-2 border-black rounded"
        />
        <p id="result2" class="bg-red-500 text-white p-6 rounded mt-2"></p>
        <button
          id="btn-kq"
          class="px-3 py-2 border-2 border-red-300 bg-red-300 hover:text-blue-600 mt-2 rounded"
        >
          Kết quả
        </button>
      </div>
      <div>
        <label class="block font-semibold text-2xl">Nhập number</label>
        <input
          type="number"
          id="number"
          placeholder="Mời bạn nhập"
          class="w-full border-2 border-black px-3 py-2 rounded"
        />
        <p id="result" class="bg-red-500 text-white mt-2 p-6 rounded"></p>
        <button
          id="btn"
          class="px-3 py-2 border mt-2 rounded border-blue-200 bg-blue-200 hover:text-red-400"
        >
          Hiển Thị
        </button>
      </div>
    </div>
    <!-- script -->
    <script src="../java/index.js"></script>
    <script src="../java/arrayLoop.js"></script>
  </body>
</html>
